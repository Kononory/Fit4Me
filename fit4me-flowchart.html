<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #F2F1ED; font-family: 'Space Mono', monospace; overflow: hidden; }

#hint {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; color: #AEADA8; letter-spacing: 0.1em;
  text-transform: uppercase; pointer-events: none; z-index: 99; white-space: nowrap;
}

#vp  { width: 100%; height: 100%; overflow: auto; }
#cnv { position: relative; }

/* Two SVG layers: edges (can be dimmed) + drag overlay (always full opacity) */
svg#svgl, svg#drag-ov {
  position: absolute; top: 0; left: 0; pointer-events: none;
}
svg#svgl    { transition: opacity 0.18s; z-index: 1; }
svg#drag-ov { z-index: 6; }
svg#svgl.dimmed { opacity: 0.08; }

/* ── Nodes ─────────────────────────────────────────────────────── */
.nd {
  position: absolute;
  border: 1.5px solid #1A1A1A; border-radius: 2px;
  font-size: 10.5px; line-height: 1.3;
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 9px;
  background: #fff; color: #1A1A1A;
  transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
  cursor: grab; user-select: none; z-index: 2;
}
.nd:active { cursor: grabbing; }
.sub { font-size: 8.5px; opacity: 0.48; margin-top: 1px; }

/* Type variants */
.t-root { font-weight: 700; font-size: 12px; border-width: 2px; cursor: default; }
.t-nav  { border-style: dashed; border-color: #9A9995; color: #555450; background: #F8F7F4; font-size: 10px; cursor: default; }
.t-tab  { font-weight: 700; }

/* Branch selection states */
.s-active  { background: #1A1A1A !important; color: #F5F4F0 !important; border-color: #1A1A1A !important; border-style: solid !important; }
.s-active .sub { opacity: 0.32; }
.s-partial { border-color: #9A9995 !important; color: #777472 !important; background: #F8F7F4 !important; }
.s-dim     { background: #F2F1ED !important; border-color: #DEDDDA !important; color: #BFBEBB !important; }

/* ── Drag states (override everything) ────────────────────────── */

/* The node being dragged — ghost at origin */
.nd-source {
  opacity: 0.12 !important;
  border: 1.5px dashed #BCBBB7 !important;
  background: #F2F1ED !important;
  color: transparent !important;
  transition: none !important;
  pointer-events: none !important;
}
.nd-source .sub { color: transparent !important; }

/* All bystander nodes — heavily dimmed */
.nd-dim {
  opacity: 0.14 !important;
  border-color: #E2E1DC !important;
  color: #E2E1DC !important;
  background: #F5F4F0 !important;
  transition: none !important;
  pointer-events: none !important;
}
.nd-dim .sub { opacity: 0 !important; }

/* The current drop target — inverted, prominent */
.nd-target {
  background: #1A1A1A !important;
  color: #FAFAF8 !important;
  border: 2px solid #1A1A1A !important;
  opacity: 1 !important;
  transition: none !important;
  pointer-events: none !important;
  z-index: 8 !important;
}
.nd-target .sub { opacity: 0.38 !important; color: #FAFAF8 !important; }

/* ── Ghost following cursor ────────────────────────────────────── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  border: 1.5px solid #1A1A1A;
  border-radius: 2px;
  background: #fff;
  color: #1A1A1A;
  font-family: 'Space Mono', monospace;
  font-size: 10.5px;
  line-height: 1.3;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 9px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.18);
  transform: rotate(2deg) scale(1.04);
  opacity: 0.92;
  white-space: nowrap;
  min-height: 36px;
}
#ghost .g-lbl { font-size: 10.5px; }
#ghost .g-sub { font-size: 8px; opacity: 0.55; margin-top: 2px; display: none; }
#ghost.has-target .g-sub { display: block; }

/* ── Inline edit ───────────────────────────────────────────────── */
.nd-input {
  background: transparent; border: none; outline: none;
  font-family: inherit; font-size: inherit; font-weight: inherit;
  color: inherit; width: 100%; padding: 0; cursor: text;
}

/* ── Retention edge marker ─────────────────────────────────────── */
#ret-marker {
  position: absolute; z-index: 7;
  width: 22px; height: 22px;
  background: #fff; border: 1.5px solid #1A1A1A; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer;
  transition: background 0.15s, color 0.15s;
  color: #1A1A1A;
}
#ret-marker:hover  { background: #1A1A1A; color: #fff; }
#ret-marker.mk-act { background: #1A1A1A; color: #fff; }
#ret-marker.mk-dim { background: #F2F1ED; border-color: #DEDDDA; color: #CCC; pointer-events: none; }

/* ── Retention popup ───────────────────────────────────────────── */
#ret-popup {
  position: absolute; z-index: 50;
  background: #FEFCF8; border: 1.5px solid #1A1A1A; border-radius: 2px;
  padding: 12px 12px 11px; width: 272px;
  display: none; pointer-events: auto;
}
</style>
</head>
<body>
<div id="hint">tap to select · drag to swap · double-click to rename · hover / for retention</div>
<div id="vp">
  <div id="cnv">
    <svg id="svgl"></svg>
    <svg id="drag-ov"></svg>
  </div>
</div>

<script>
// ── Tree ──────────────────────────────────────────────────────────────────────
const T = {
  id:'root', label:'Fit4Me', type:'root',
  c:[
    { id:'navp', label:'Primary nav bar', sublabel:'Plan · Workouts · Fasting · Me · More', type:'nav', c:[
      { id:'plan', label:'Plan', type:'tab', b:'plan', c:[
        { id:'ai',   label:'AI assistant block', sublabel:'ask your coach', b:'plan' },
        { id:'p28',  label:'28-day program', b:'plan', c:[
          { id:'days', label:'Day cells 1–28', b:'plan', c:[
            { id:'dc', label:'completed', sublabel:'past',   b:'plan' },
            { id:'da', label:'active',    sublabel:'today',  b:'plan' },
            { id:'dl', label:'locked',    sublabel:'future', b:'plan' },
          ]},
          { id:'tapd', label:'Tap day → Day detail', b:'plan' },
        ]},
        { id:'dday', label:'Day detail', b:'plan', c:[
          { id:'tl',   label:'Task list',               b:'plan' },
          { id:'cs',   label:'Completion status / task', b:'plan' },
          { id:'prgs', label:'Progress summary',         b:'plan' },
        ]},
      ]},
      { id:'wkt', label:'Workouts', type:'tab', b:'workouts', c:[
        { id:'cats', label:'Categories', b:'workouts', c:[
          { id:'ch', label:'Fitness at home', b:'workouts' },
          { id:'cw', label:'Wall Pilates',    b:'workouts' },
          { id:'ca', label:'Asian Pilates',   b:'workouts' },
          { id:'cx', label:'...',             b:'workouts' },
        ]},
        { id:'wd', label:'Workout detail', sublabel:'category → list → detail', b:'workouts', c:[
          { id:'wds', label:'Description',           b:'workouts' },
          { id:'wdu', label:'Duration / level',      b:'workouts' },
          { id:'wex', label:'Exercise list → Start', b:'workouts' },
        ]},
      ]},
      { id:'sc',   label:'Challenges', type:'tab', b:'secondary' },
      { id:'me',   label:'Me', type:'tab', b:'me', c:[
        { id:'mst', label:'Statistics', b:'me' },
        { id:'mse', label:'Settings',   b:'me', c:[
          { id:'mac', label:'Account',   b:'me', c:[
            { id:'mav', label:'Avatar / name',    b:'me' },
            { id:'mem', label:'Email',            sublabel:'+ add if missing', b:'me' },
            { id:'mlu', label:'Language / Units', b:'me' },
            { id:'mlo', label:'Log out',          b:'me' },
            { id:'mda', label:'Delete account',   b:'me' },
          ]},
          { id:'mpd', label:'Personal details', b:'me', c:[
            { id:'mbd', label:'Body data', sublabel:'weight · height · age',    b:'me' },
            { id:'mgo', label:'Goals',     sublabel:'target weight · activity', b:'me' },
          ]},
          { id:'mn',  label:'Nutrition',     b:'me' },
          { id:'mno', label:'Notifications', b:'me' },
          { id:'mhe', label:'Help', b:'me', c:[
            { id:'mfq', label:'FAQ',    b:'me' },
            { id:'msp', label:'Support', sublabel:'email', b:'me', c:[
              { id:'mms', label:'Manage subscription', b:'me' },
            ]},
            { id:'mle', label:'Legal',  sublabel:'Privacy · Terms', b:'me' },
          ]},
        ]},
      ]},
      { id:'more', label:'More', type:'tab', b:'more', c:[
        { id:'mora', label:'Opens secondary nav', b:'more' },
      ]},
    ]},
    { id:'navs', label:'Secondary nav bar', type:'nav', b:'secondary', c:[
      { id:'sb',   label:'← Back',   b:'secondary' },
      { id:'sw',   label:'Workouts', b:'secondary' },
      { id:'sm',   label:'Meals',    b:'secondary' },
      { id:'fast', label:'Fasting',  type:'tab', b:'fasting', c:[
        { id:'ft', label:'Active fast timer', b:'fasting' },
        { id:'fc', label:'Start / stop fast', b:'fasting' },
        { id:'fp', label:'Protocol selector', sublabel:'16:8 · 18:6 · 24h…', b:'fasting' },
        { id:'fh', label:'History',           b:'fasting' },
      ]},
    ]},
  ]
};

// ── Retention data ────────────────────────────────────────────────────────────
const RET = [
  {pct:100,s:'D1'},{pct:58.4,s:'2d'},{pct:42.0,s:'3d'},
  {pct:33.3,s:'4d'},{pct:28.0,s:'5d'},{pct:24.1,s:'6-10'},
  {pct:13.5,s:'11-15'},{pct:8.83,s:'16-20'},{pct:6.10,s:'21-28'},
];

// ── Layout constants ──────────────────────────────────────────────────────────
const NW=156, NH=36, LW=184, RH=40, PAD=40;

function doLayout(n, d, r) {
  n.depth=d; n.x=PAD+d*LW;
  if (!n.c||!n.c.length) { n.row=r; return 1; }
  let cr=r, tot=0;
  for (const ch of n.c) { const s=doLayout(ch,d+1,cr); cr+=s; tot+=s; }
  n.row=(n.c[0].row+n.c[n.c.length-1].row)/2;
  return tot;
}

function flat(n,a=[]){a.push(n);(n.c||[]).forEach(c=>flat(c,a));return a;}
function edgs(n,a=[]){(n.c||[]).forEach(c=>{a.push([n,c]);edgs(c,a);});return a;}

let totalR = doLayout(T,0,0);
const allN = flat(T), allE = edgs(T);

const cnv   = document.getElementById('cnv');
const svgl  = document.getElementById('svgl');
const dragOv= document.getElementById('drag-ov');

function syncSize() {
  const md = Math.max(...allN.map(n=>n.depth));
  const cw = PAD*2+md*LW+NW, ch = PAD*2+totalR*RH;
  cnv.style.width=cw+'px'; cnv.style.height=ch+'px';
  [svgl,dragOv].forEach(s=>{
    s.setAttribute('width',cw); s.setAttribute('height',ch);
    s.setAttribute('viewBox',`0 0 ${cw} ${ch}`);
  });
}
syncSize();

// ── Coordinate helpers ────────────────────────────────────────────────────────
const cY = n => PAD+n.row*RH+RH/2;
const tY = n => cY(n)-NH/2;

// ── Branch-selection state ────────────────────────────────────────────────────
let sel     = null;
let editing = false;
let tapTimer= null, tapId=null;
let hideTimer=null;

function nSt(n){
  if (!sel) return 'def';
  if (!n.b) return 'par';
  return n.b===sel?'act':'dim';
}
function eSt(f,t){
  const fs=nSt(f),ts=nSt(t);
  if(fs==='act'&&ts==='act') return 'act';
  if(fs==='dim'||ts==='dim') return 'dim';
  return 'par';
}

// ── Tree manipulation ─────────────────────────────────────────────────────────
function parentOf(root, id){
  if(!root.c) return null;
  for(let i=0;i<root.c.length;i++){
    if(root.c[i].id===id) return {p:root,i};
    const r=parentOf(root.c[i],id);
    if(r) return r;
  }
  return null;
}
function swap(a,b){
  if(a.type==='root'||a.type==='nav'||b.type==='root'||b.type==='nav') return;
  const fa=parentOf(T,a.id), fb=parentOf(T,b.id);
  if(!fa||!fb) return;
  fa.p.c[fa.i]=b; fb.p.c[fb.i]=a;
  totalR=doLayout(T,0,0);
  syncSize();
  render();
}

// ── Drag state ────────────────────────────────────────────────────────────────
const dr = {
  node:null, el:null, ghost:null, target:null,
  sx:0, sy:0, on:false
};

function canDrag(n){ return n.type!=='root'&&n.type!=='nav'; }

// Apply drag-mode classes to all node elements
function applyDragClasses(){
  cnv.querySelectorAll('.nd').forEach(el=>{
    const id=el.dataset.nid;
    if(id===dr.node.id)        el.classList.add('nd-source');
    else                       el.classList.add('nd-dim');
  });
}

// Highlight new target, un-highlight old
function setTarget(newTarget){
  if(dr.target===newTarget) return; // no change

  // Un-highlight old
  if(dr.target){
    const old=cnv.querySelector(`[data-nid="${dr.target.id}"]`);
    if(old){ old.classList.remove('nd-target'); old.classList.add('nd-dim'); }
  }

  dr.target=newTarget;

  // Highlight new
  if(dr.target){
    const el=cnv.querySelector(`[data-nid="${dr.target.id}"]`);
    if(el){ el.classList.remove('nd-dim'); el.classList.add('nd-target'); }
  }

  // Update ghost label
  if(dr.ghost){
    const sub=dr.ghost.querySelector('.g-sub');
    if(dr.target){
      sub.textContent='↕ '+dr.target.label;
      dr.ghost.classList.add('has-target');
    } else {
      dr.ghost.classList.remove('has-target');
    }
  }

  // Update swap indicator line in overlay SVG
  updateDragOverlay();
}

function updateDragOverlay(){
  const NS='http://www.w3.org/2000/svg';
  dragOv.innerHTML='';
  if(!dr.on||!dr.target) return;

  const x1=dr.node.x+NW/2, y1=cY(dr.node);
  const x2=dr.target.x+NW/2, y2=cY(dr.target);
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const mk=(t,a,p)=>{const e=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);p?.appendChild(e);return e;};
  const tx=(s,a,p)=>{const e=mk('text',a,p);e.textContent=s;return e;};

  // Connecting dashed line
  mk('line',{x1,y1,x2,y2,stroke:'#1A1A1A','stroke-width':1.2,'stroke-dasharray':'5 3','stroke-opacity':0.35},dragOv);

  // Endpoint dots
  mk('circle',{cx:x1,cy:y1,r:3.5,fill:'#ABABAA'},dragOv);
  mk('circle',{cx:x2,cy:y2,r:3.5,fill:'#1A1A1A'},dragOv);

  // ⇄ badge at midpoint
  mk('rect',{x:mx-13,y:my-9,width:26,height:18,rx:2,fill:'#1A1A1A'},dragOv);
  tx('⇄',{x:mx,y:my+5,'text-anchor':'middle',fill:'#fff','font-size':11,'font-family':'Space Mono,monospace'},dragOv);
}

function dragBegin(n,el,cx,cy){
  if(!canDrag(n)) return;
  dr.node=n; dr.el=el; dr.sx=cx; dr.sy=cy; dr.on=false;
}

function dragMove(cx,cy){
  if(!dr.node) return;
  if(!dr.on && Math.hypot(cx-dr.sx,cy-dr.sy)>8){
    dr.on=true;
    // Cancel pending click
    if(tapTimer){clearTimeout(tapTimer);tapTimer=null;tapId=null;}
    // Dim edges
    svgl.classList.add('dimmed');
    // Dim/source-mark all nodes
    applyDragClasses();
    // Create ghost
    dr.ghost=document.createElement('div');
    dr.ghost.id='ghost';
    dr.ghost.innerHTML=`<span class="g-lbl">${dr.node.label}</span><span class="g-sub"></span>`;
    dr.ghost.style.width=NW+'px';
    if(dr.el.classList.contains('t-tab')) dr.ghost.querySelector('.g-lbl').style.fontWeight='700';
    document.body.appendChild(dr.ghost);
    document.body.style.cursor='grabbing';
  }
  if(!dr.on) return;
  dr.ghost.style.left=(cx-NW/2)+'px';
  dr.ghost.style.top =(cy-NH/2)+'px';

  // Hit-test against all nodes in canvas coords
  const r=cnv.getBoundingClientRect();
  const vp=document.getElementById('vp');
  const mx=cx-r.left+vp.scrollLeft;
  const my=cy-r.top +vp.scrollTop;
  let hit=null;
  for(const n of allN){
    if(n===dr.node||!canDrag(n)) continue;
    if(mx>=n.x&&mx<=n.x+NW&&my>=tY(n)&&my<=tY(n)+NH){hit=n;break;}
  }
  setTarget(hit);
}

function dragEnd(){
  if(!dr.node) return;
  if(dr.on){
    if(dr.target&&dr.target!==dr.node) swap(dr.node,dr.target);
    // Cleanup
    if(dr.ghost) dr.ghost.remove();
    svgl.classList.remove('dimmed');
    dragOv.innerHTML='';
    cnv.querySelectorAll('.nd-source,.nd-dim,.nd-target').forEach(e=>{
      e.classList.remove('nd-source','nd-dim','nd-target');
    });
    document.body.style.cursor='';
    if(!dr.target) render(); // re-apply selection state if no swap (swap calls render)
  }
  dr.node=dr.el=dr.ghost=dr.target=null; dr.on=false;
}

// Global mouse/touch listeners
document.addEventListener('mousemove',e=>dragMove(e.clientX,e.clientY));
document.addEventListener('mouseup',  ()=>dragEnd());
document.addEventListener('touchmove',e=>{
  const t=e.touches[0]; dragMove(t.clientX,t.clientY);
  if(dr.on) e.preventDefault();
},{passive:false});
document.addEventListener('touchend',()=>dragEnd());

// ── Render: edges ─────────────────────────────────────────────────────────────
function renderSVG(){
  svgl.innerHTML='';
  for(const [f,t] of allE){
    const x1=f.x+NW,y1=cY(f),x2=t.x,y2=cY(t),mx=(x1+x2)/2;
    const es=eSt(f,t);
    const stroke=es==='act'?'#1A1A1A':es==='dim'?'#E0DFD9':'#ABABAA';
    const sw=es==='act'?1.5:1;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1} ${y1}C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke',stroke);
    p.setAttribute('stroke-width',sw);
    svgl.appendChild(p);
  }
}

// ── Render: nodes ─────────────────────────────────────────────────────────────
function renderNodes(){
  if(editing) return;
  cnv.querySelectorAll('.nd').forEach(e=>e.remove());
  for(const n of allN){
    const el=document.createElement('div');
    el.className='nd'; el.dataset.nid=n.id;
    if(n.type==='root') el.classList.add('t-root');
    if(n.type==='nav')  el.classList.add('t-nav');
    if(n.type==='tab')  el.classList.add('t-tab');
    const st=nSt(n);
    if(st==='act')      el.classList.add('s-active');
    else if(st==='par') el.classList.add('s-partial');
    else if(st==='dim') el.classList.add('s-dim');
    el.style.left=n.x+'px'; el.style.top=tY(n)+'px';
    el.style.width=NW+'px'; el.style.height=NH+'px';
    el.innerHTML=`<span class="nd-lbl">${n.label}</span>${n.sublabel?`<span class="sub">${n.sublabel}</span>`:''}`;

    // Mouse drag start
    el.addEventListener('mousedown',e=>{
      if(e.button!==0) return;
      e.stopPropagation();
      dragBegin(n,el,e.clientX,e.clientY);
    });
    // Touch drag start
    el.addEventListener('touchstart',e=>{
      const t=e.touches[0];
      dragBegin(n,el,t.clientX,t.clientY);
    },{passive:true});

    // Click / double-click
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(dr.on) return;
      if(tapTimer&&tapId===n.id){
        clearTimeout(tapTimer);tapTimer=null;tapId=null;
        startEdit(el,n);
      } else {
        tapId=n.id;
        tapTimer=setTimeout(()=>{
          tapTimer=null;tapId=null;
          if(n.b) sel=sel===n.b?null:n.b; else sel=null;
          render();
        },270);
      }
    });

    cnv.appendChild(el);
  }
}

// ── Inline rename ─────────────────────────────────────────────────────────────
function startEdit(el,n){
  editing=true;
  const lbl=el.querySelector('.nd-lbl'),orig=n.label;
  const inp=document.createElement('input');
  inp.className='nd-input'; inp.value=n.label;
  lbl.replaceWith(inp); inp.focus(); inp.select();
  inp.addEventListener('click',    e=>e.stopPropagation());
  inp.addEventListener('mousedown',e=>e.stopPropagation());
  const commit=()=>{ n.label=inp.value.trim()||orig; editing=false; render(); };
  const cancel=()=>{ n.label=orig; editing=false; render(); };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Enter')  {e.preventDefault();inp.removeEventListener('blur',commit);commit();}
    if(e.key==='Escape') {inp.removeEventListener('blur',commit);cancel();}
  });
}

// ── Retention popup ───────────────────────────────────────────────────────────
function buildRetSVG(){
  const NS='http://www.w3.org/2000/svg';
  const W=248,H=140,ml=8,mr=4,mt=20,mb=18,cw=W-ml-mr,ch=H-mt-mb,cb=mt+ch;
  const bw=16,bg=(cw-RET.length*bw)/(RET.length-1);
  const bxx=i=>ml+i*(bw+bg),pyy=p=>cb-(p/100)*ch;
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.style.display='block';
  const mk=(t,a,p)=>{const e=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);p?.appendChild(e);return e;};
  const tx=(s,a,p)=>{const e=mk('text',a,p);e.textContent=s;return e;};
  const defs=document.createElementNS(NS,'defs');
  defs.innerHTML=`<pattern id="rdh" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"><line x1="0" y1="6" x2="6" y2="0" stroke="#2C4B8A" stroke-width="1.8" stroke-opacity="0.42"/></pattern>`;
  svg.appendChild(defs);
  tx('retention funnel · 28-day program',{x:W/2,y:13,'text-anchor':'middle',fill:'#AEADA8','font-size':7,'font-weight':700,'font-family':'Space Mono,monospace','letter-spacing':'0.06em'},svg);
  mk('line',{x1:ml,y1:cb,x2:ml+cw,y2:cb,stroke:'#DDDAD4','stroke-width':0.8},svg);
  RET.forEach((d,i)=>{
    const prev=i===0?100:RET[i-1].pct,x=bxx(i),sY=pyy(d.pct),sH=(d.pct/100)*ch,hY=pyy(prev),hH=((prev-d.pct)/100)*ch,last=i===8;
    if(hH>0.3)mk('rect',{x,y:hY,width:bw,height:hH,fill:'url(#rdh)'},svg);
    if(sH>0.3)mk('rect',{x,y:sY,width:bw,height:sH,fill:last?'#B52B1E':'#2C4B8A'},svg);
    if(i===0){tx('100%',{x:x+bw/2,y:sY+10,'text-anchor':'middle',fill:'#fff','font-size':6,'font-weight':700,'font-family':'Space Mono,monospace'},svg);}
    else{const ly=Math.max(Math.min(hH>0.3?hY:sY,sY)-2,mt+2);tx(d.pct+'%',{x:x+bw/2,y:ly,'text-anchor':'middle',fill:last?'#B52B1E':'#B0AFA9','font-size':last?7.5:6,'font-weight':last?700:400,'font-family':'Space Mono,monospace'},svg);}
    tx(d.s,{x:x+bw/2,y:cb+11,'text-anchor':'middle',fill:'#CFCECA','font-size':5.5,'font-family':'Space Mono,monospace'},svg);
  });
  return svg;
}

const p28N = allN.find(n=>n.id==='p28');
const daysN= allN.find(n=>n.id==='days');

const marker=document.createElement('div');
marker.id='ret-marker'; marker.textContent='/';
cnv.appendChild(marker);

const popup=document.createElement('div');
popup.id='ret-popup';
popup.appendChild(buildRetSVG());
const co=document.createElement('div');
co.style.cssText='margin-top:8px;font-size:8.5px;color:#B52B1E;font-weight:700;letter-spacing:0.02em;';
co.textContent='6.10% complete the full 28-day cycle';
popup.appendChild(co);
const sl=document.createElement('div');
sl.style.cssText='margin-top:3px;font-size:7.5px;color:#AEADA8;';
sl.textContent='93.9% of all starters never reach day 28';
popup.appendChild(sl);
cnv.appendChild(popup);

marker.addEventListener('mouseenter',()=>{clearTimeout(hideTimer);popup.style.display='block';});
marker.addEventListener('mouseleave',()=>{hideTimer=setTimeout(()=>{popup.style.display='none';},150);});
popup.addEventListener('mouseenter', ()=>clearTimeout(hideTimer));
popup.addEventListener('mouseleave', ()=>{popup.style.display='none';});

function updateMarker(){
  const mx=(p28N.x+NW+daysN.x)/2, my=(cY(p28N)+cY(daysN))/2;
  marker.style.left=(mx-11)+'px'; marker.style.top=(my-11)+'px';
  popup.style.left=(mx+18)+'px';  popup.style.top=(my-104)+'px';
  marker.classList.remove('mk-act','mk-dim');
  if(!sel) return;
  const st=nSt(p28N);
  if(st==='act') marker.classList.add('mk-act');
  if(st==='dim') marker.classList.add('mk-dim');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){ renderSVG(); renderNodes(); updateMarker(); }

cnv.addEventListener('click',()=>{ if(editing||dr.on) return; sel=null; render(); });

render();

requestAnimationFrame(()=>{
  const vp=document.getElementById('vp');
  vp.scrollTop=Math.max(0,PAD+T.row*RH+RH/2-vp.clientHeight/2);
});
</script>
</body>
</html>
